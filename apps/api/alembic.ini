[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC
prepend_sys_path = .

# Left empty — loaded from .env in env.py
sqlalchemy.url =

[post_write_hooks]
# Optional: auto-format new migration files with Ruff
hooks = ruff
ruff.type = exec
ruff.executable = uv run ruff
ruff.options = format REVISION_SCRIPT_FILENAME