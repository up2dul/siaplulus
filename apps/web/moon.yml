language: 'typescript'

tasks:
  dev:
    command: 'pnpm dev'
    options:
      persistent: true

  build:
    command: 'pnpm build'
    outputs:
      - 'dist'

  lint:
    command: 'biome lint apps/web/src'
    inputs:
      - 'src/**/*.{ts,tsx}'
    options:
      runFromWorkspaceRoot: true

  format:
    command: 'biome format --write apps/web/src'
    inputs:
      - 'src/**/*.{ts,tsx}'
    options:
      runFromWorkspaceRoot: true

  check:
    command: 'biome check --write apps/web/src'
    inputs:
      - 'src/**/*.{ts,tsx}'
      - 'tsconfig.json'
    options:
      runFromWorkspaceRoot: true

  typecheck:
    command: 'pnpm tsc --noEmit'
    inputs:
      - 'src/**/*.{ts,tsx}'
      - 'tsconfig.json'